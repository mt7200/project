#应用部署的地址，不加context，斜杠结尾
cas:
  server:
    url: http://portal.it.sunsheen.cn/cas
  client:
    host: http://portal.it.sunsheen.cn/
    web-path: ${cas.client.host}${server.servlet.context-base}/
    login-path: /login/cas
    validation-type: CAS3

#HKDAS相关配置,springboot同类项未配置相关信息使用HKDAS中的配置
application:
  registry:
    address: 172.18.130.105:8999
    client:
      enabled: false
  profile:cas:
    
  #添加核格作用域下面的配置，优先级高于spring下的datasource配置
  #数据库相关配置
hearken:
  #数据库相关配置
  database:
    #默认数据源
    default:
      dialect: MySQLDialect
      driver-class-name: com.mysql.cj.jdbc.Driver
      password: hkzbxt
      username: hkzbxt
      url: jdbc:mysql://www.sunsheen.cn:13383/systest?useUnicode=true&characterEncoding=UTF-8&serverTimezone=UTC
      # 连接池配置
      druid:
        # 初始化连接数
        initialSize: 5
        #连接池中的最小空闲连接数
        minIdle: 5
        #控制连接池中的最大活动连接数
        maxActive: 15
        # 配置获取连接等待超时的时间
        maxWait: 60000
        # 配置间隔多久才进行一次检测，检测需要关闭的空闲连接，单位毫秒
        timeBetweenEvictionRunsMillis: 60000
        # 配置一个连接在池中最小生存时间
        minEvictableIdleTimeMillis: 300000
        testWhileIdle: true
        testOnBorrow: false
        # 打开 PSCache，并且指定每个连接上 PSCache 的大小
        poolPreparedStatements: true
        maxPoolPreparedStatementPerConnectionSize: 20
        # 配置监控统计拦截的 Filter，去掉后监控界面 SQL 无法统计，wall 用于防火墙
        filters: stat,wall,slf4j
        # 通过 connectProperties 属性打开 mergeSql 功能；慢 SQL 记录
        connectProperties: druid.stat.mergeSql\=true;druid.stat.slowSqlMillis\=5000