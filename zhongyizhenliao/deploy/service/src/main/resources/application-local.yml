server:
  port: 19308

spring:
  datasource:
    url: jdbc:mysql://localhost:3306/tcm_hospital?useUnicode=true&characterEncoding=UTF-8&serverTimezone=UTC&allowPublicKeyRetrieval=true&useSSL=false
    username: root
    password: SWB123swb
    driver-class-name: com.mysql.cj.jdbc.Driver
  jpa:
    hibernate:
      ddl-auto: none
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect
        format_sql: true

hearken:
  database:
    default:
      dialect: MySQLDialect
      driver-class-name: com.mysql.cj.jdbc.Driver
      password: SWB123swb
      username: root
      url: jdbc:mysql://localhost:3306/tcm_hospital?useUnicode=true&characterEncoding=UTF-8&serverTimezone=UTC&allowPublicKeyRetrieval=true&useSSL=false
      druid:
        initialSize: 5
        minIdle: 5
        maxActive: 15
        maxWait: 60000
        timeBetweenEvictionRunsMillis: 60000
        minEvictableIdleTimeMillis: 300000
        testWhileIdle: true
        testOnBorrow: false
        poolPreparedStatements: true
        maxPoolPreparedStatementPerConnectionSize: 20
        filters: stat,wall,slf4j
        connectProperties: druid.stat.mergeSql\=true;druid.stat.slowSqlMillis\=5000

liteflow:
  enable-monitor-file: true
  print-execution-log: false
  monitor:
    enable: true
    queue-limit: 1000
    enable-log: false
    period: 500
    delay: 2000

sa-token:
  cookie-auto-fill-prefix: true
  token-prefix: Bearer
  token-name: Authorization
  timeout: 2592000
  active-timeout: -1
  is-concurrent: false
  is-share: false
  token-style: simple-uuid
  auto-renew: true
  is-log: true
  extension:
    enabled: true
    excludes:
      - /
      - /api/auth/login
      - /api/auth/logout
      - /*/Login.*
      - /*/CheckLogin.*
      - /static/**
      - /assets/**
      - /*.js
      - /*.css
      - /*.html
      - /*.ico
      - /*.png
      - /*.jpg
      - /*.jpeg
      - /*.gif
      - /*.svg
      - /*.woff
      - /*.woff2
      - /*.ttf
      - /*.json
    demo-mode: false
    demo-mode-includes:
      - /api/auth/login
      - /api/auth/logout
    basic-permissions:
      - user/info
      - auth/getUserMenu
