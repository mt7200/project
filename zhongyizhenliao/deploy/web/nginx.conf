server {
    listen 80;
    server_name  localhost;

    #CAS服务地址
    location /cas/ {
        proxy_pass http://portal.it.sunsheen.cn/cas/;
        proxy_set_header Host $proxy_host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    #前端访问地址
    location /zhongyizhenliao {
        return 301 $scheme://$http_host/zhongyizhenliao/;
    }

    location /zhongyizhenliao/ {
        alias /usr/share/nginx/html/;
        try_files $uri $uri/ /zhongyizhenliao/index.html;
        index  index.html index.htm;
    }

    #后端服务地址
    location /zhongyizhenliao/service/ {
        proxy_pass http://localhost:19385/zhongyizhenliao/service/;
    }
}